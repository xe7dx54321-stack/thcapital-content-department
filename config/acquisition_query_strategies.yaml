schema_version: v1

strategies:
  official_ai_lab:
    language: [en]
    region: [global]
    keywords:
      primary: [OpenAI, Anthropic, DeepMind, Google AI, Meta AI, Microsoft AI, NVIDIA AI]
      secondary: [agent, model, research, safety, platform, API, inference]
      event_terms: [launches, introduces, releases, updates, research, partnership]
      exclude: [careers, event replay]
    lookback_hours: 24
    max_items_per_source: 40
    sort: [published_at_desc]
    expansion_trigger: {minimum_items: 3, action: broaden_to_secondary_keywords}
    zero_result_fallback: manual_url_backfill
  model_release:
    language: [en]
    region: [global]
    keywords:
      primary: [foundation model, reasoning model, multimodal, open model, inference]
      secondary: [weights, eval, benchmark, context window, distillation]
      event_terms: [release, launch, preview, general availability, checkpoint]
      exclude: [rumor, meme]
    lookback_hours: 24
    max_items_per_source: 50
    sort: [published_at_desc, source_authority_desc]
    expansion_trigger: {minimum_items: 2, action: include_model_family_terms}
    zero_result_fallback: watch
  agent_framework:
    language: [en]
    region: [global]
    keywords:
      primary: [agent, multi-agent, tool use, computer use, MCP, workflow]
      secondary: [orchestration, memory, eval, browser use, code agent]
      event_terms: [release, changelog, integration, framework]
      exclude: [marketing-only]
    lookback_hours: 24
    max_items_per_source: 50
    sort: [published_at_desc]
    expansion_trigger: {minimum_items: 2, action: include_open_source_terms}
    zero_result_fallback: github_trending
  open_source:
    language: [en]
    region: [global]
