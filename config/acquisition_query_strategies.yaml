    lookback_hours: 24
    max_items_per_source: 50
    sort: [published_at_desc, engagement_desc]
    expansion_trigger: {minimum_items: 3, action: broaden_keywords}
    zero_result_fallback: watch
  paper_research:
    language: [en]
    region: [global]
    keywords:
      primary: [LLM agents, tool use, reasoning, inference, AI infrastructure]
      secondary: [benchmark, evaluation, multimodal, alignment, retrieval]
      event_terms: [paper, arXiv, accepted, benchmark]
