schema_version: v1

agents:
  proponent:
    purpose: Identify why the draft may be worth advancing.
    use_supplied_evidence_only: true
  critic:
    purpose: Attack evidence, logic, title, opening, and generic language.
    must_flag_missing_evidence: true
  judge:
    purpose: Decide ACCEPT, REVISE, HOLD, or REJECT without bypassing rule gates.
    min_accept_score: 0.78
  rewrite:
    purpose: Generate a new version sidecar when judge asks for revision.
    overwrite_original: false

review_checks:
  - clear_question
  - core_judgment
  - logic_progression
  - evidence_fit
  - narrative_tension
  - reader_relevance
  - risk_balance
  - wechat_readability

boundaries:
  no_auto_publish: true
  no_prompt_auto_apply: true
  rewrite_creates_new_version: true
  cost_guard_required_for_live: true

