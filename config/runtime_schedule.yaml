schema_version: v1

runtime:
  enabled: true
  timezone: system_local
  scheduler_tick_seconds: 30
  heartbeat_seconds: 60
  max_parallel_jobs: 2
  startup_catchup_enabled: true
  catchup_max_age_hours: 24

daily_schedule:
  morning_acquisition:
    enabled: true
    time: "07:30"
    jobs:
      - acquisition_playbook_plan
      - acquisition_phase29

  morning_backfill:
    enabled: true
    time: "10:30"
    jobs:
      - activation_phase30

  afternoon_refresh:
    enabled: true
    time: "14:00"
    jobs:
      - acquisition_playbook_plan
      - acquisition_phase29

  evening_acquisition:
    enabled: true
    time: "18:00"
    jobs:
      - acquisition_playbook_plan
      - acquisition_phase29
      - activation_phase30

  topic_selection:
    enabled: true
    time: "18:15"
    jobs:
      - activation_phase30

  content_generation:
    enabled: true
    time: "18:25"
    jobs:
      - content_generation_daily

  agent_review:
    enabled: true
    time: "18:45"
    jobs:
      - agent_review_daily
      - article_quality_review

  workbench_finalize:
    enabled: true
    time: "19:00"
    jobs:
      - acquisition_playbook_regression
      - stable_daily_ops
      - workbench_data
      - workbench_build

weekly_schedule:
  weekly_retrospective:
    enabled: true
    weekday: 0
    time: "09:00"
    jobs:
      - weekly_content_retro
